# Lightweight CRAN-PM config for smoke-testing on a single GPU / laptop.
# Tiny grids and short epochs — not for publication-quality results.

model:
  era5_channels: 70
  global_img_size: [168, 280]
  global_patch_size: 8
  global_embed_dim: 192
  global_depth: 2
  global_num_heads: 4
  local_channels: 5
  local_img_size: [128, 128]
  local_patch_size: 16
  local_embed_dim: 128
  local_depth: 2
  local_num_heads: 4
  cross_num_heads: 4
  cross_layers: 1
  decoder_depth: 1
  out_channels: 1
  mlp_ratio: 4.0
  drop_rate: 0.0
  drop_path: 0.0
  global_region_h: 7
  global_region_w: 7

data:
  era5_dir: ${CRANPM_DATA_ROOT}/era5_europe_daily
  ghap_dir: ${CRANPM_DATA_ROOT}/ghap_pm25_europe_daily
  elev_coarse_path: ${CRANPM_DATA_ROOT}/elevation/elevation.zarr
  elev_hires_path: ${CRANPM_DATA_ROOT}/elevation/gmted2010_europe.zarr
  cams_dir: ${CRANPM_DATA_ROOT}/cams_europe
  eea_zarr_path: ${CRANPM_DATA_ROOT}/eea_stations/eea_pm25_daily.zarr
  train_years: [2018]
  val_years: [2019]
  test_years: [2020]
  horizons: [1]
  patch_size: 128
  normalize: true
  num_workers: 0
  augment: false
  hotspot_ratio: 0.0
  hotspot_power: 1.0

train:
  batch_size: 1
  val_batch_size: 1
  learning_rate: 1.0e-4
  warmup_epochs: 0
  weight_decay: 0.05
  min_lr: 1.0e-6
  epochs: 2
  alpha_mse: 1.0
  alpha_spectral: 0.0
  alpha_station: 0.0
  alpha_grad: 0.0
  precision: "32-true"
  accumulate_grad_batches: 1
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  save_top_k: 1
